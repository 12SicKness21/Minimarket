  <line x1="296" y1="256" x2="296" y2="316" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <line x1="344" y1="256" x2="328" y2="316" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
